# 文件名：loki-config.yml
# 作者：DevOps团队
# 日期：2026-05-16
# 版本：v1.1.0
# 功能描述：Loki日志聚合系统配置文件
# 更新记录：
#   2026-05-28 - v1.1.0 - 配置日志保留策略（30天），启用自动删除

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2020-10-24
      store: boltdb-shipper
      object_store: filesystem
      schema: v11
      index:
        prefix: index_
        period: 24h

ruler:
  alertmanager_url: http://localhost:9093
  enable_api: true
  enable_sharding: false
  storage:
    type: local
  rule_path: /loki/rules
  ring:
    kvstore:
      store: inmemory

# ── 日志保留策略 ──────────────────────────────────
limits_config:
  enforce_metric_name: false
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  per_stream_rate_limit: 16MB
  per_stream_rate_limit_burst: 15MB
  # 保留策略：日志保留 30 天
  retention_period: 720h        # 30天 = 720小时
  retention_stream:
    - selector: '{job=~".+"}'
      priority: 1
      period: 720h

storage_config:
  boltdb_shipper:
    active_index_directory: /loki/index
    shared_store: filesystem
    cache_location: /loki/index_cache
    resync_interval: 5s

chunk_store_config:
  max_look_back_period: 0s

table_manager:
  # 启用保留删除
  retention_deletes_enabled: true
  retention_period: 720h        # 30天
