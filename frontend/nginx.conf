# 文件名：nginx.conf
# 作者：DevOps团队
# 日期：2026-05-21
# 版本：v1.0.0
# 功能描述：Nginx生产环境配置，包含静态资源缓存、Gzip/Brotli压缩、安全头

# 基础配置
user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    
    access_log /var/log/nginx/access.log main;
    
    # 基本优化
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    
    # Gzip压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 10240;
    gzip_types text/plain text/css text/xml text/javascript
               application/javascript application/xml application/xml+rss
               application/json image/svg+xml;
    
    # Brotli压缩（需要安装ngx_brotli模块）
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types text/plain text/css text/xml text/javascript
    #            application/javascript application/xml application/json
    #            image/svg+xml;
    
    # 上游服务器配置
    upstream backend {
        server backend:3000;
        keepalive 32;
    }
    
    server {
        listen 80;
        server_name localhost;
        
        # 前端静态文件服务
        location / {
            root /usr/share/nginx/html;
            index index.html;
            
            # Vue Router history模式支持
            try_files $uri $uri/ /index.html;
            
            # 静态资源缓存策略
            # JS/CSS - 长期缓存（带hash文件名）
            location ~* \.(js|css)$ {
                expires 1y;
                add_header Cache-Control "public, max-age=31536000, immutable";
                add_header ETag "";
                try_files $uri =404;
            }
            
            # 图片资源 - 中期缓存
            location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|avif)$ {
                expires 30d;
                add_header Cache-Control "public, max-age=2592000";
                try_files $uri =404;
            }
            
            # 字体文件 - 长期缓存
            location ~* \.(woff|woff2|eot|ttf|otf)$ {
                expires 1y;
                add_header Cache-Control "public, max-age=31536000, immutable";
                try_files $uri =404;
            }
            
            # HTML文件 - 不缓存（或短期缓存）
            location ~* \.html$ {
                expires -1;
                add_header Cache-Control "no-cache, no-store, must-revalidate";
                add_header Pragma "no-cache";
                try_files $uri =404;
            }
            
            # 安全头部
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "1; mode=block" always;
        }
        
        # 后端API代理
        location /api {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            
            # WebSocket支持
            proxy_read_timeout 86400;
        }
        
        # Socket.io支持
        location /socket.io {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}

