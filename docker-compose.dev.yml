# 文件名：docker-compose.dev.yml
# 作者：DevOps团队
# 日期：2026-05-09
# 版本：v1.1.0
# 功能描述：开心农场开发环境Docker Compose配置
# 更新记录：
#   2026-06-13 - v1.1.0 - 修复数据库初始化挂载路径，统一使用sql_init目录挂载，解决docker_init.sql中\i路径不匹配导致数据不可见的问题
#   2026-05-09 - v1.0.0 - 初始版本创建

version: '3.8'

services:
  # PostgreSQL数据库
  postgres:
    image: postgres:16-alpine
    container_name: happy-farm-postgres-dev
    environment:
      POSTGRES_DB: happy_farm_dev
      POSTGRES_USER: happy_farm
      POSTGRES_PASSWORD: happy_farm_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      # 挂载整个sql_init目录，与生产环境保持一致
      - ./sql_init:/docker-entrypoint-initdb.d/sql_init
      # docker_init.sql作为入口脚本，重命名为01-确保最先执行
      - ./sql_init/docker_init.sql:/docker-entrypoint-initdb.d/01-docker-init.sql
    networks:
      - happy-farm-dev-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U happy_farm -d happy_farm_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: happy-farm-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    networks:
      - happy-farm-dev-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 后端服务（开发模式）
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: happy-farm-backend-dev
    environment:
      NODE_ENV: development
      PORT: 3000
      HOST: "0.0.0.0"
      # 数据库连接字符串（后端代码主要使用此变量）
      DATABASE_URL: "postgresql://happy_farm:happy_farm_dev_password@postgres:5432/happy_farm_dev"
      # 数据库单独配置（管理脚本使用）
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: happy_farm_dev
      DB_USER: happy_farm
      DB_PASSWORD: happy_farm_dev_password
      # Redis配置
      REDIS_ENABLED: "true"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # JWT认证配置
      JWT_SECRET: "dev_jwt_secret_key_for_local_development_only"
      JWT_EXPIRES_IN: "7d"
      JWT_REFRESH_EXPIRES_IN: "30d"
      # CORS配置
      CORS_ORIGIN: "http://localhost:5173"
      # 速率限制
      RATE_LIMIT_MAX: "1000"
      # 数据加密
      ENCRYPTION_KEY: "dev_encryption_key_for_local_development"
      # 开发环境配置
      DEBUG: happy-farm:*
      LOG_LEVEL: debug
    ports:
      - "3000:3000"
    volumes:
      - ./backend/src:/app/src
      - ./backend/logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - happy-farm-dev-network
    restart: unless-stopped
    command: npm run dev

  # 前端应用（开发模式）
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: happy-farm-frontend-dev
    environment:
      NODE_ENV: development
      # 标识Docker开发环境，Vite代理使用容器名访问后端
      DOCKER_DEV: "true"
    ports:
      - "5173:5173"
      # Vite热重载端口
      - "24678:24678"
    volumes:
      # 挂载前端代码，实现热重载
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      # 配置文件单独挂载，避免修改后需要重新构建
      - ./frontend/vite.config.js:/app/vite.config.js
      - ./frontend/.env:/app/.env
      # 排除node_modules，使用容器内已安装的依赖
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - happy-farm-dev-network
    restart: unless-stopped

volumes:
  postgres_dev_data:
  redis_dev_data:

networks:
  happy-farm-dev-network:
    driver: bridge
