# 文件名：prometheus.yml
# 作者：DevOps团队
# 日期：2026-06-03
# 版本：v1.0.0
# 功能描述：Grafana Prometheus数据源配置

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: false
    editable: false
    jsonData:
      timeInterval: "15s"
